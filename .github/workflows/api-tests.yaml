name: API Tests
permissions:
  contents: read
on:
  push:
    branches:
      - dev
    paths:
      - "apps/api/**"
  pull_request:
    paths:
      - "apps/api/**"
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: latest

      - name: Install dependencies
        run: uv sync
        working-directory: apps/api

      - name: Run tests with coverage
        run: uv run pytest src/tests/ -v --tb=short --cov=src --cov-report=html --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=25
        working-directory: apps/api
        env:
          TESTING: "true"

      - name: Upload API coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/api/coverage.xml
          flags: api
          name: api-coverage
          # Don't fail the job if the upload can't authenticate. The real
          # coverage gate is pytest's --cov-fail-under=25 above; Codecov here is
          # just external reporting. This fork has no CODECOV_TOKEN, and Codecov
          # rejects tokenless uploads, so a hard-fail would block every PR. Set
          # the CODECOV_TOKEN secret to get reporting back; gating is unaffected.
          fail_ci_if_error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: api-coverage-report
          path: apps/api/htmlcov/
          retention-days: 30
