# Fork-only: build the LearnHouse fat image (the app, carrying the
# live-classrooms code) and publish it to Docker Hub under the ceduth namespace,
# so kuploy can deploy it via the learnhouse-live template.
#
# NOTE: this builds the LearnHouse *app* image — NOT the LiveKit server (that's
# upstream livekit/livekit-server, deployed straight from the template).
#
# Separate from upstream's build-community.yaml (which pushes to
# ghcr.io/learnhouse/app) so upstream sync stays conflict-free.
#
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME  e.g. ceduth
#   DOCKERHUB_TOKEN     a Docker Hub token scoped read/write to ceduth/learnhouse-app
name: Publish live-classrooms image

on:
  push:
    branches:
      - main
    # Only rebuild when the image contents can actually change — keeps doc/CI
    # edits from triggering a full image build. Use workflow_dispatch to force one.
    paths:
      - 'apps/**'
      - 'Dockerfile'
  workflow_dispatch: # allow a manual build before/without a merge

permissions:
  contents: read

env:
  IMAGE: docker.io/ceduth/learnhouse-app

jobs:
  publish:
    name: Publish live-classrooms image (amd64 → Docker Hub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH="${{ github.ref_name }}"
          echo "tags=${IMAGE}:${BRANCH},${IMAGE}:${BRANCH}-${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          # amd64-only for a fast, reliable publish (target cluster is amd64).
          # Multi-arch via native arm64 runners is a follow-up.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            LEARNHOUSE_PUBLIC=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
