# Fork-only: build the LearnHouse docs site image and publish it to Docker Hub
# (ceduth/learnhouse-docs), for the `learnhouse-docs` stack component.
#
# Builds on PRs that touch docs/** (push: false) so the image is verified before
# merge, and builds + pushes on push to main.
#
# Requires repo secrets DOCKERHUB_USERNAME + DOCKERHUB_TOKEN (same as the app image).
name: Publish learnhouse-docs image (Docker Hub)

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/publish-docs-image.yaml'
  pull_request:
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: docker.io/ceduth/learnhouse-docs

jobs:
  publish:
    name: Build amd64 image + push on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          # Sanitize the ref: on PRs github.ref_name is "<n>/merge" and the "/"
          # is not a valid Docker tag char. PR builds aren't pushed; the tag just
          # has to be valid.
          BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
          echo "tags=${IMAGE}:${BRANCH},${IMAGE}:${BRANCH}-${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Build and (on main) push
        uses: docker/build-push-action@v7
        with:
          context: ./docs
          file: ./docs/Dockerfile
          platforms: linux/amd64
          # PRs build-verify only; pushes/dispatch publish.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
