name: Notify Infrastructure

on:
  push:
    branches:
      - main
      - dev
    tags:
      - '[0-9]*'
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions: {}

jobs:
  notify:
    name: Dispatch to Infrastructure Repo
    runs-on: ubuntu-latest
    # Only run where an infrastructure repo is actually configured. Without
    # `vars.INFRA_REPO` the dispatch has no target and can only fail (the case
    # in the kuploy fork, which does not use this upstream infra pipeline), so
    # skip cleanly instead. Also skip for fork PRs: GitHub does not expose
    # secrets (INFRA_REPO_PAT) there, so the dispatch could only ever fail.
    if: >-
      vars.INFRA_REPO != '' &&
      ( github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository )
    steps:
      - name: Send repository dispatch
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.INFRA_REPO_PAT }}
          repository: ${{ vars.INFRA_REPO }}
          event-type: source-update
          client-payload: |
            {
              "sha": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}",
              "event": "${{ github.event_name }}",
              "pr_number": "${{ github.event.pull_request.number || '' }}",
              "pr_action": "${{ github.event.action || '' }}",
              "repo": "${{ github.repository }}"
            }
